name: seml-ecommerce-reco

services:
  command-service:
    build:
      context: .
      target: runtime
    image: seml-ecommerce-reco:latest
    command: uvicorn ecom_ml.command_service.main:app --host 0.0.0.0 --port 8101
    environment:
      SEML_DATA_PATH: /app/data/interactions.csv
      SEML_ARTIFACT_DIR: /app/artifacts
    ports:
      - "8101:8101"
    volumes:
      - ./data:/app/data
      - ./artifacts:/app/artifacts
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8101/health')",
        ]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    restart: unless-stopped

  query-service:
    build:
      context: .
      target: runtime
    image: seml-ecommerce-reco:latest
    command: uvicorn ecom_ml.query_service.main:app --host 0.0.0.0 --port 8102
    environment:
      SEML_ARTIFACT_DIR: /app/artifacts
    ports:
      - "8102:8102"
    volumes:
      - ./artifacts:/app/artifacts:ro
    depends_on:
      command-service:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8102/health')",
        ]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    restart: unless-stopped
