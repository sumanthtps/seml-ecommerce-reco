name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Quality — Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: |
            pyproject.toml
            requirements.txt

      - name: Install dependencies
        run: python -m pip install -r requirements.txt -e ".[dev,report]"

      - name: Lint
        run: ruff check src tests scripts tools

      - name: Check formatting
        run: ruff format --check src tests scripts tools

      - name: Type-check
        run: mypy

      - name: Test
        run: pytest --cov=ecom_ml --cov-report=term-missing

  docker:
    name: Build container
    runs-on: ubuntu-latest
    needs: quality

    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: seml-ecommerce-reco:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
